# Railway / production
spring:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    validate-on-migrate: false
    repair-on-migrate: false
    connect-retries: 10
    lock-retry-count: 20
  datasource:
    hikari:
      initialization-fail-timeout: 120000

server:
  address: 0.0.0.0
  port: ${PORT:8080}

logging:
  level:
    root: INFO
    org.flywaydb: INFO
    com.ingazgate.crm.config: INFO
