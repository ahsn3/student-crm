<div xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="card application-new-card" id="oldStudentNewPage"
       th:attr="data-msg-no-match=#{applications.form.noMatch},
                data-msg-name-required=#{oldStudents.flash.nameRequired},
                data-msg-passport-required=#{oldStudents.flash.passportRequired},
                data-msg-year-required=#{oldStudents.flash.yearRequired},
                data-msg-university-required=#{oldStudents.flash.universityRequired},
                data-msg-department-required=#{oldStudents.flash.departmentRequired},
                data-msg-nationality-required=#{oldStudents.flash.nationalityRequired}">
    <div class="card-header application-new-header">
      <div>
        <div class="title" th:text="#{page.oldStudentsNew.title}">Add old student</div>
        <div class="subtle" th:text="#{oldStudents.new.subtitle}">Enter archived student details and choose the academic year.</div>
      </div>
      <a class="btn application-new-back-btn"
         th:href="@{/old-students/{y}(y=${#strings.replace(selectedOldStudentYear,' ','-')})}"
         th:text="#{applications.new.back}">Back to list</a>
    </div>

    <div class="subtle uni-flash uni-flash--ok" th:if="${oldStudentSuccessKey}" th:text="#{__${oldStudentSuccessKey}__}">Saved.</div>
    <div class="subtle uni-flash uni-flash--err" th:if="${oldStudentErrorKey}" th:text="#{__${oldStudentErrorKey}__}">Error</div>
    <div class="subtle uni-flash uni-flash--err" id="oldStudentNewClientError" hidden></div>

    <form id="oldStudentNewForm" th:action="@{/old-students}" method="post"
          class="profile-form crm-app-form application-new-form" style="max-width: 720px;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <div class="field programs-filter-select programs-filter-select--uni">
        <label for="oldStudentYearNative">
          <span th:text="#{oldStudents.form.academicYear}">Academic year</span>
          <span class="field-required" aria-hidden="true"> *</span>
        </label>
        <select id="oldStudentYearNative" name="academicYear" class="prog-uni-native"
                th:attr="data-placeholder=#{oldStudents.form.placeholderYear}">
          <option th:each="year : ${oldStudentYears}" th:value="${year}" th:text="${year}"
                  th:selected="${year == selectedOldStudentYear}">2025 2026</option>
        </select>
      </div>

      <div class="field">
        <label for="oldStudentName">
          <span th:text="#{students.form.fullName}">Full name</span>
          <span class="field-required" aria-hidden="true"> *</span>
        </label>
        <input id="oldStudentName" name="name" type="text" maxlength="200" autocomplete="name">
      </div>

      <div class="field programs-filter-select programs-filter-select--uni">
        <label for="oldStudentUniversityNative">
          <span th:text="#{nav.universities}">University</span>
          <span class="field-required" aria-hidden="true"> *</span>
        </label>
        <select id="oldStudentUniversityNative" name="university" class="prog-uni-native"
                th:attr="data-placeholder=#{oldStudents.form.placeholderUniversity}">
          <option th:each="u : ${oldStudentUniversityOptions}" th:value="${u}" th:text="${u}">University</option>
        </select>
      </div>

      <div class="field programs-filter-select programs-filter-select--uni">
        <label for="oldStudentDepartmentNative">
          <span th:text="#{nav.programs}">Program</span>
          <span class="field-required" aria-hidden="true"> *</span>
        </label>
        <select id="oldStudentDepartmentNative" name="department" class="prog-uni-native"
                th:attr="data-placeholder=#{oldStudents.form.placeholderProgram}">
          <option th:each="d : ${oldStudentDepartmentOptions}" th:value="${d}" th:text="${d}">Program</option>
        </select>
      </div>

      <div class="field">
        <label for="oldStudentPassport">
          <span th:text="#{students.col.passport}">Passport</span>
          <span class="field-required" aria-hidden="true"> *</span>
        </label>
        <input id="oldStudentPassport" name="passport" type="text" maxlength="80" autocomplete="off">
      </div>

      <div class="field">
        <label for="oldStudentEmail" th:text="#{common.email}">Email</label>
        <input id="oldStudentEmail" name="email" type="email" maxlength="200" autocomplete="email">
      </div>

      <div class="field">
        <label for="oldStudentPhone" th:text="#{common.phone}">Phone</label>
        <input id="oldStudentPhone" name="phone" type="tel" maxlength="80" autocomplete="tel">
      </div>

      <div class="field">
        <label for="oldStudentNationalityComboInput">
          <span th:text="#{common.nationality}">Nationality</span>
          <span class="field-required" aria-hidden="true"> *</span>
        </label>
        <div class="crm-combobox" data-combobox>
          <input type="hidden" name="nationality" id="oldStudentNationalityHidden"
                 th:value="${selectedOldStudentNationality}">
          <input type="text" id="oldStudentNationalityComboInput" class="crm-combobox-input crm-combobox-input--nat"
                 autocomplete="off" spellcheck="false"
                 role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="oldStudentNationalityComboList"
                 th:placeholder="#{applications.combobox.searchNationality}"
                 th:value="${selectedOldStudentNationality}">
          <ul class="crm-combobox-panel crm-combobox-panel--scroll" id="oldStudentNationalityComboList" role="listbox" hidden>
            <li th:each="nat : ${nationalityOptions}" role="option" tabindex="-1" class="crm-combobox-option"
                th:data-value="${nat}" th:data-label="${nat}" th:text="${nat}">Country</li>
          </ul>
        </div>
      </div>

      <div class="profile-actions application-new-actions">
        <button class="btn primary" type="submit" th:text="#{oldStudents.form.submit}">Save old student</button>
      </div>
    </form>
  </div>
</div>
