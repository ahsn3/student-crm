<div xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="title" th:text="${complaint.subject}">Complaint</div>
        <div class="subtle">
          <span th:text="${complaint.status}">OPEN</span>
          ·
          <span th:text="${complaint.author != null ? (complaint.author.displayName != null ? complaint.author.displayName : complaint.author.email) : '—'}">Author</span>
        </div>
      </div>
      <a class="btn" th:href="@{/complaints}" th:text="#{common.back}">Back</a>
    </div>
    <div class="subtle uni-flash uni-flash--ok" th:if="${complaintSuccessKey}" th:text="#{__${complaintSuccessKey}__}"></div>
    <div class="subtle uni-flash uni-flash--err" th:if="${complaintErrorKey}" th:text="#{__${complaintErrorKey}__}"></div>
    <div class="subtle" th:if="${complaint.body != null}" th:text="${complaint.body}" style="white-space:pre-wrap;"></div>
  </div>

  <div class="card" style="margin-top:14px;">
    <div style="font-weight:800;margin-bottom:12px;" th:text="#{complaints.comments.title}">Comments</div>
    <div th:if="${#lists.isEmpty(complaintComments)}" class="empty" th:text="#{complaints.comments.empty}">No comments yet.</div>
    <div class="feedback-comment-list" th:if="${!#lists.isEmpty(complaintComments)}">
      <article th:each="c : ${complaintComments}" class="feedback-comment-card">
        <div class="feedback-comment-card-head">
          <span class="feedback-comment-author" th:text="${c.author != null ? (c.author.displayName != null ? c.author.displayName : c.author.email) : '—'}">User</span>
          <time class="feedback-comment-time subtle" th:text="${c.createdAt != null ? @displayTime.format(c.createdAt, 'yyyy-MM-dd HH:mm') : ''}">—</time>
        </div>
        <div class="feedback-comment-body" th:text="${c.body}">Comment</div>
      </article>
    </div>
    <form th:action="@{|/complaints/${complaint.id}/comments|}" method="post" class="profile-form" style="margin-top:16px;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="field">
        <label th:text="#{complaints.comments.add}">Add comment</label>
        <textarea name="body" rows="3" maxlength="2000" required></textarea>
      </div>
      <button type="submit" class="btn primary" th:text="#{complaints.comments.submit}">Post comment</button>
    </form>
  </div>
</div>
