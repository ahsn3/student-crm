<div xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="title" th:text="#{page.complaints.title}">Complaints</div>
        <div class="subtle" th:text="#{complaints.subtitle}">Support requests and issues</div>
      </div>
      <button type="button" class="btn primary" id="openComplaintCreateModal" th:text="#{complaints.create}">+ Create complaint</button>
    </div>

    <div class="subtle uni-flash uni-flash--ok" th:if="${complaintSuccessKey}" th:text="#{__${complaintSuccessKey}__}"></div>
    <div class="subtle uni-flash uni-flash--err" th:if="${complaintErrorKey}" th:text="#{__${complaintErrorKey}__}"></div>

    <div th:if="${#lists.isEmpty(complaints)}" class="empty" th:text="#{common.noResults}">No results found!</div>

    <div class="crm-scroll-area" th:if="${!#lists.isEmpty(complaints)}">
      <table class="table">
        <thead>
        <tr>
          <th th:text="#{complaints.col.subject}">Subject</th>
          <th th:text="#{common.status}">Status</th>
          <th th:text="#{complaints.col.author}">Author</th>
          <th th:text="#{students.col.created}">Created</th>
          <th th:text="#{common.actions}">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${complaints}" class="crm-clickable-row" th:attr="data-href=@{/complaints/{id}(id=${c.id})}">
          <td><span class="crm-row-primary" th:text="${c.subject}">Subject</span></td>
          <td th:text="${c.status}">OPEN</td>
          <td th:text="${c.author != null ? (c.author.displayName != null ? c.author.displayName : c.author.email) : '—'}">Author</td>
          <td th:text="${c.createdAt != null ? @displayTime.format(c.createdAt, 'yyyy-MM-dd HH:mm') : '—'}">—</td>
          <td><span class="btn-view-pill" th:text="#{common.view}">View</span></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="complaintCreateModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="complaintCreateModalTitle">
    <div class="modal-backdrop" data-close-complaint-modal tabindex="-1"></div>
    <div class="modal-dialog">
      <div class="modal-dialog-header">
        <h2 id="complaintCreateModalTitle" class="modal-dialog-title" th:text="#{complaints.create}">Create complaint</h2>
        <button type="button" class="modal-close" data-close-complaint-modal th:attr="aria-label=#{common.close}">×</button>
      </div>
      <form th:action="@{/complaints}" method="post" class="modal-form modal-form--stack">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="field">
          <label th:text="#{complaints.col.subject}">Subject</label>
          <input name="subject" required maxlength="500">
        </div>
        <div class="field">
          <label th:text="#{complaints.body}">Details</label>
          <textarea name="body" rows="5" maxlength="8000"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" data-close-complaint-modal th:text="#{common.cancel}">Cancel</button>
          <button type="submit" class="btn primary" th:text="#{common.save}">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
