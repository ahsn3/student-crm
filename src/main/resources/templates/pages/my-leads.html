<div xmlns:th="http://www.thymeleaf.org" th:fragment="content" id="myLeadsPage">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="title" th:text="${viewAllLeads} ? #{page.leads.title} : #{page.myLeads.title}">Leads</div>
        <div class="subtle" th:text="${viewAllLeads} ? #{leads.all.subtitle} : #{leads.my.subtitle}">Leads list</div>
      </div>
    </div>

    <div class="leads-filters-bar">
      <form class="filters crm-app-form" method="get" th:action="@{/my-leads}">
        <div class="field leads-filter-search">
          <label for="search" th:text="#{common.search}">Search</label>
          <input id="search" name="search" type="search" th:value="${searchQuery}" th:placeholder="#{leads.searchPlaceholder}">
        </div>
        <div class="field programs-filter-select programs-filter-select--uni">
          <label for="status" th:text="#{leads.filter.status}">Status</label>
          <select id="status" name="status" class="prog-uni-native"
                  th:attr="data-placeholder=#{common.all}">
            <option value="" th:text="#{common.all}">All</option>
            <option th:each="s : ${leadStatuses}"
                    th:value="${s.name()}"
                    th:selected="${statusFilter == s}"
                    th:text="${#messages.msgOrNull('lead.status.' + s.name()) ?: s.name()}">Status</option>
          </select>
        </div>
        <div class="field programs-filter-select programs-filter-select--uni">
          <label for="leadType" th:text="#{leads.filter.type}">Lead type</label>
          <select id="leadType" name="leadType" class="prog-uni-native"
                  th:attr="data-placeholder=#{common.all}">
            <option value="" th:text="#{common.all}">All</option>
            <option th:each="t : ${leadTypes}"
                    th:value="${t.name()}"
                    th:selected="${leadTypeFilter == t}"
                    th:text="${#messages.msgOrNull('lead.type.' + t.name()) ?: t.name()}">Type</option>
          </select>
        </div>
        <div class="field leads-filter-actions">
          <label class="leads-filter-actions-label" aria-hidden="true">&nbsp;</label>
          <button class="btn primary btn--filter-apply" type="submit" th:text="#{common.filter}">Filter</button>
        </div>
      </form>
    </div>

    <div class="crm-scroll-area table-scroll-wrap">
      <table class="table">
        <thead>
        <tr>
          <th th:text="#{leads.col.student}">Student</th>
          <th th:text="#{leads.col.type}">Type</th>
          <th th:if="${viewAllLeads}" th:text="#{leads.col.assignedTo}">Assigned to</th>
          <th th:text="#{common.phone}">Phone</th>
          <th th:text="#{leads.col.targetUniversity}">Target University</th>
          <th th:text="#{leads.col.status}">Status</th>
          <th th:text="#{common.createdAt}">Created</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(leadsPage.items())}">
          <td th:colspan="${viewAllLeads} ? 7 : 6" class="empty"
              th:text="${viewAllLeads} ? #{leads.all.empty} : #{leads.my.empty}">No leads yet.</td>
        </tr>
        <tr th:each="lead : ${leadsPage.items()}" class="crm-clickable-row"
            th:attr="data-href=@{/my-leads/{id}(id=${lead.id()})}">
          <td><span class="crm-row-primary" th:text="${lead.studentName()}">Name</span></td>
          <td th:text="${#messages.msgOrNull('lead.type.' + lead.leadType().name()) ?: lead.leadType()}">TYPE</td>
          <td th:if="${viewAllLeads}"
              th:text="${lead.assignedEmployee() != null ? lead.assignedEmployee().name() : '—'}">—</td>
          <td th:text="${lead.phone() != null ? lead.phone() : '—'}">—</td>
          <td th:text="${lead.targetUniversity() != null ? lead.targetUniversity() : '—'}">—</td>
          <td>
            <span class="tag info"
                  th:text="${#messages.msgOrNull('lead.status.' + lead.status().name()) ?: lead.status()}">NEW</span>
          </td>
          <td th:text="${lead.createdAt() != null ? @displayTime.format(lead.createdAt(), 'yyyy-MM-dd HH:mm') : '—'}">—</td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination-row" th:if="${leadsPage.totalPages() > 1}">
      <a class="btn" th:if="${leadsPage.page() > 0}"
         th:href="@{/my-leads(page=${leadsPage.page() - 1}, status=${statusFilter}, leadType=${leadTypeFilter}, search=${searchQuery})}"
         th:text="#{common.previous}">Previous</a>
      <span class="subtle"
            th:text="#{leads.pagination(${leadsPage.page() + 1}, ${leadsPage.totalPages()}, ${leadsPage.totalElements()})}">Page</span>
      <a class="btn" th:if="${leadsPage.page() + 1 < leadsPage.totalPages()}"
         th:href="@{/my-leads(page=${leadsPage.page() + 1}, status=${statusFilter}, leadType=${leadTypeFilter}, search=${searchQuery})}"
         th:text="#{common.next}">Next</a>
    </div>
  </div>
</div>
