<div xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="card application-new-card">
    <div class="card-header application-new-header">
      <div>
        <div class="title" th:text="#{page.studentsNew.title}">Add student</div>
        <div class="subtle" th:text="#{students.new.subtitle}">Enter student details and save.</div>
      </div>
      <a class="btn application-new-back-btn" th:href="@{/students}" th:text="#{students.new.back}">Back to list</a>
    </div>

    <div class="subtle uni-flash uni-flash--err" th:if="${studentErrorKey}" th:text="#{__${studentErrorKey}__}">Error</div>

    <form id="studentNewForm" th:action="@{/students}" method="post" class="profile-form crm-app-form application-new-form" style="max-width: 720px;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="field">
        <label for="fullName">
          <span th:text="#{students.form.fullName}">Full name</span>
          <span class="field-required" aria-hidden="true"> *</span>
        </label>
        <input id="fullName" name="fullName" type="text" required maxlength="200" autocomplete="name">
      </div>
      <div class="field">
        <label for="passportNo">
          <span th:text="#{students.col.passport}">Passport</span>
          <span class="field-required" aria-hidden="true"> *</span>
        </label>
        <input id="passportNo" name="passportNo" type="text" required maxlength="80" autocomplete="off">
      </div>
      <div class="field">
        <label for="fatherName" th:text="#{students.col.father}">Father name</label>
        <input id="fatherName" name="fatherName" type="text" maxlength="200">
      </div>
      <div class="field">
        <label for="motherName" th:text="#{students.col.mother}">Mother name</label>
        <input id="motherName" name="motherName" type="text" maxlength="200">
      </div>
      <div class="field">
        <label for="gender" th:text="#{students.col.gender}">Gender</label>
        <select id="gender" name="gender">
          <option value="" th:text="#{students.form.gender.unspecified}">—</option>
          <option value="M" th:text="#{students.form.gender.m}">Male</option>
          <option value="F" th:text="#{students.form.gender.f}">Female</option>
          <option value="OTHER" th:text="#{students.form.gender.other}">Other</option>
        </select>
      </div>
      <div class="field">
        <label for="email" th:text="#{common.email}">Email</label>
        <input id="email" name="email" type="email" maxlength="200" autocomplete="email">
      </div>
      <div class="field">
        <label for="phone">
          <span th:text="#{common.phone}">Phone</span>
          <span class="field-required" aria-hidden="true"> *</span>
        </label>
        <input id="phone" name="phone" type="tel" required maxlength="80" autocomplete="tel">
      </div>
      <div class="field">
        <label for="nationalityComboInput">
          <span th:text="#{common.nationality}">Nationality</span>
          <span class="field-required" aria-hidden="true"> *</span>
        </label>
        <div class="crm-combobox" data-combobox>
          <input type="hidden" name="nationality" id="nationalityHidden" value="">
          <input type="text" id="nationalityComboInput" class="crm-combobox-input crm-combobox-input--nat" autocomplete="off" spellcheck="false"
                 role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="nationalityComboList"
                 th:placeholder="#{applications.combobox.searchNationality}">
          <ul class="crm-combobox-panel crm-combobox-panel--scroll" id="nationalityComboList" role="listbox" hidden>
            <li th:each="nat : ${nationalityOptions}" role="option" tabindex="-1" class="crm-combobox-option"
                th:data-value="${nat}" th:data-label="${nat}" th:text="${nat}">Country</li>
          </ul>
        </div>
      </div>
      <div class="profile-actions application-new-actions">
        <button class="btn primary" type="submit" th:text="#{students.form.submit}">Save student</button>
      </div>
    </form>
  </div>
</div>
