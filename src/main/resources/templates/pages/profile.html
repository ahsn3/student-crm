<div xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="profile-page"
       id="profilePage"
       th:attr="data-remove-confirm=#{profile.removePhoto.confirm}">
    <header class="profile-page-head">
      <h1 class="profile-page-title" th:text="#{nav.account.editProfile}">Edit profile</h1>
      <p class="subtle profile-page-subtitle" th:text="#{profile.subtitle}">Update your name, sign-in email, and profile photo.</p>
    </header>

    <div class="card profile-card profile-card--details">
      <div class="profile-flash profile-flash--ok" th:if="${profileSuccess}" th:text="${profileSuccess}"></div>
      <div class="profile-flash profile-flash--err" th:if="${profileError}" th:text="${profileError}"></div>

      <section class="profile-photo-section" th:if="${profileCanEditPhoto}" aria-labelledby="profilePhotoHeading">
        <h2 id="profilePhotoHeading" class="profile-section-title" th:text="#{profile.label.photo}">Profile photo</h2>
        <p class="subtle profile-field-hint profile-photo-hint" th:text="#{profile.hint.photo}">PNG, JPG, or WEBP, up to 1 MB.</p>

        <div class="profile-photo-row">
          <div class="profile-photo-avatar"
               id="profilePhotoAvatar"
               th:classappend="${!profileHasPhoto} ? ' profile-photo-avatar--empty' : ''">
            <img th:if="${profileHasPhoto and profileUserId != null}"
                 id="profilePhotoImg"
                 th:src="@{/users/{id}/avatar(id=${profileUserId})}"
                 alt=""
                 width="96"
                 height="96"
                 loading="eager"
                 decoding="sync"
                 class="profile-photo-avatar-img">
            <span th:unless="${profileHasPhoto}"
                  id="profilePhotoInitials"
                  class="profile-photo-initials"
                  th:text="${profileInitials}">U</span>
          </div>

          <div class="profile-photo-actions">
            <p class="profile-photo-file-name subtle"
               id="profilePhotoFileName"
               th:attr="data-empty=#{profile.noPhoto},data-current=#{profile.photoCurrent},data-pending=#{profile.changePhoto}"
               th:text="${profileHasPhoto} ? #{profile.photoCurrent} : #{profile.noPhoto}">No profile photo yet.</p>

            <div class="profile-photo-buttons">
              <label for="profileLogoFile"
                     class="btn primary profile-photo-upload-btn"
                     th:text="${profileHasPhoto} ? #{profile.changePhoto} : #{profile.uploadPhoto}">Upload photo</label>
              <form th:if="${profileHasPhoto}"
                    th:action="@{/profile/remove-photo}"
                    method="post"
                    class="profile-remove-photo-form"
                    id="profileRemovePhotoForm"
                    data-no-page-transition>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn profile-photo-remove-btn" th:text="#{profile.removePhoto}">Remove profile photo</button>
              </form>
            </div>
          </div>
        </div>
      </section>

      <h2 class="profile-section-title profile-section-title--details" th:text="#{profile.section.details}">Account details</h2>

      <form th:action="@{/profile}" method="post" enctype="multipart/form-data" class="profile-form" id="profileForm">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <input th:if="${profileCanEditPhoto}"
               id="profileLogoFile"
               name="logoFile"
               type="file"
               accept="image/png,image/jpeg,image/webp"
               class="profile-photo-file-input visually-hidden"
               aria-describedby="profilePhotoHeading">

        <div class="field">
          <label for="displayName" th:text="#{auth.label.fullName}">Full name</label>
          <input id="displayName" name="displayName" type="text" th:value="${profileName}" required maxlength="120" autocomplete="name">
        </div>
        <div class="field">
          <label for="emailLocal" th:text="#{profile.label.username}">Username</label>
          <div th:if="${profileIsAgent}" class="profile-email-row">
            <input id="emailLocal" name="emailLocal" type="text" th:value="${profileEmailLocal}"
                   required minlength="2" maxlength="64" spellcheck="false" autocomplete="username"
                   pattern="[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])"
                   th:title="#{profile.input.title}">
            <span class="profile-email-domain" aria-hidden="true" th:text="${profileEmailDomain}">@office</span>
          </div>
          <input th:unless="${profileIsAgent}" id="emailLocal" name="emailLocal" type="text"
                 th:value="${profileUsername}" required minlength="2" maxlength="64" spellcheck="false"
                 autocomplete="username" pattern="[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])"
                 th:title="#{profile.input.title}">
        </div>
        <div class="field" th:if="${profileIsAgent}">
          <label for="phone" th:text="#{common.phone}">Phone</label>
          <input id="phone" name="phone" type="tel" maxlength="80" autocomplete="tel" th:value="${profilePhone}">
        </div>
        <div class="field">
          <label th:text="#{profile.label.role}">Role</label>
          <input class="profile-readonly" th:value="#{role.__${profileRole}__}" type="text" readonly tabindex="-1" aria-readonly="true">
        </div>
        <div class="profile-actions">
          <button class="btn primary" type="submit" th:text="#{profile.save}">Save profile</button>
        </div>
      </form>
    </div>

    <div class="card profile-card profile-card--password">
      <div class="card-header">
        <div>
          <div class="title" th:text="#{profile.password.title}">Password</div>
          <div class="subtle" th:text="#{profile.password.subtitle}">Enter your current password, then your new password twice</div>
        </div>
      </div>

      <div class="profile-flash profile-flash--ok" th:if="${passwordSuccess}" th:text="${passwordSuccess}"></div>
      <div class="profile-flash profile-flash--err" th:if="${passwordError}" th:text="${passwordError}"></div>

      <form th:action="@{/profile/password}" method="post" class="profile-form profile-password-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="field">
          <label for="currentPassword" th:text="#{profile.password.current}">Current password</label>
          <input id="currentPassword" name="currentPassword" type="password" required autocomplete="current-password">
        </div>
        <div class="field">
          <label for="newPassword" th:text="#{profile.password.new}">New password</label>
          <input id="newPassword" name="newPassword" type="password" required minlength="8" maxlength="72" autocomplete="new-password">
          <p class="subtle profile-field-hint" th:text="#{auth.password.hint}">At least 8 characters.</p>
        </div>
        <div class="field">
          <label for="confirmPassword" th:text="#{profile.password.confirm}">Confirm new password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" required minlength="8" maxlength="72" autocomplete="new-password">
        </div>
        <div class="profile-actions">
          <button class="btn primary" type="submit" th:text="#{profile.password.update}">Update password</button>
        </div>
      </form>
    </div>
  </div>
</div>
