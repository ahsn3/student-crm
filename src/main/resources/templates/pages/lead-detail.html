<div xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="card" th:with="lead=${detail.lead()}">
    <div class="card-header">
      <div>
        <div class="title" th:text="${lead.studentName()}">Student</div>
        <div class="subtle">
          <span th:text="${lead.leadType()}">TYPE</span>
          ·
          <span class="tag info" th:text="${lead.status()}">STATUS</span>
        </div>
      </div>
      <a class="btn" th:href="@{/my-leads}" th:text="#{leads.backToList}">Back to my leads</a>
    </div>

    <div class="subtle uni-flash uni-flash--ok" th:if="${param.saved}" th:text="#{leads.saved}">Saved.</div>
    <div class="subtle uni-flash uni-flash--ok" th:if="${param.noteSaved}" th:text="#{leads.noteSaved}">Note added.</div>

    <div class="lead-detail-grid">
      <section class="card lead-detail-section">
        <h2 class="profile-section-title" th:text="#{leads.section.student}">Student information</h2>
        <form th:action="@{/my-leads/{id}/update(id=${lead.id()})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div class="field">
            <label th:text="#{leads.col.student}">Student name</label>
            <input name="studentName" type="text" th:value="${lead.studentName()}">
          </div>
          <div class="field">
            <label th:text="#{common.phone}">Phone</label>
            <input name="phone" type="tel" th:value="${lead.phone()}">
          </div>
          <div class="field">
            <label th:text="#{common.email}">Email</label>
            <input name="email" type="email" th:value="${lead.email()}">
          </div>
          <div class="field">
            <label th:text="#{common.nationality}">Nationality</label>
            <input name="nationality" type="text" th:value="${lead.nationality()}">
          </div>
          <div class="field">
            <label th:text="#{leads.col.targetUniversity}">Target university</label>
            <input name="targetUniversity" type="text" th:value="${lead.targetUniversity()}">
          </div>
          <div class="field">
            <label th:text="#{leads.col.desiredMajor}">Desired major</label>
            <input name="desiredMajor" type="text" th:value="${lead.desiredMajor()}">
          </div>
          <div class="field">
            <label th:text="#{leads.col.status}">Status</label>
            <select name="status">
              <option th:each="s : ${leadStatuses}" th:value="${s}" th:text="${s}"
                      th:selected="${lead.status() == s}"></option>
            </select>
          </div>
          <div class="field">
            <label th:text="#{common.notes}">Notes</label>
            <textarea name="notes" rows="4" th:text="${lead.notes()}"></textarea>
          </div>
          <button class="btn primary" type="submit" th:text="#{common.save}">Save</button>
        </form>
      </section>

      <section class="card lead-detail-section">
        <h2 class="profile-section-title" th:text="#{leads.section.timeline}">Follow-up notes</h2>
        <form th:action="@{/my-leads/{id}/notes(id=${lead.id()})}" method="post" class="lead-note-form">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <div class="field">
            <label th:text="#{leads.addNote}">Add note</label>
            <textarea name="note" rows="3" required placeholder="Call summary, next steps..."></textarea>
          </div>
          <button class="btn" type="submit" th:text="#{leads.saveNote}">Save note</button>
        </form>

        <div class="lead-notes-list">
          <div class="subtle" th:if="${#lists.isEmpty(detail.notes())}" th:text="#{leads.noNotes}">No notes yet.</div>
          <article class="lead-note-item" th:each="n : ${detail.notes()}">
            <div class="lead-note-meta">
              <strong th:text="${n.employee() != null ? n.employee().name() : '—'}">Employee</strong>
              <span th:text="${n.createdAt() != null ? @displayTime.format(n.createdAt(), 'yyyy-MM-dd HH:mm') : ''}">time</span>
            </div>
            <p th:text="${n.note()}">Note text</p>
          </article>
        </div>
      </section>
    </div>

    <section class="card lead-detail-section">
      <h2 class="profile-section-title" th:text="#{leads.section.history}">History</h2>
      <div class="lead-history-grid">
        <div>
          <h3 th:text="#{leads.assignmentHistory}">Assignment history</h3>
          <ul class="lead-history-list">
            <li th:each="h : ${detail.assignmentHistory()}">
              <span th:text="${h.employee() != null ? h.employee().name() : '—'}">Employee</span>
              ·
              <span th:text="${h.assignedAt() != null ? @displayTime.format(h.assignedAt(), 'yyyy-MM-dd HH:mm') : ''}">time</span>
            </li>
          </ul>
        </div>
        <div>
          <h3 th:text="#{leads.statusHistory}">Status history</h3>
          <ul class="lead-history-list">
            <li th:each="s : ${detail.statusHistory()}">
              <span th:text="${s.oldStatus() != null ? s.oldStatus() : '—'}">OLD</span>
              →
              <span th:text="${s.newStatus()}">NEW</span>
              ·
              <span th:text="${s.changedAt() != null ? @displayTime.format(s.changedAt(), 'yyyy-MM-dd HH:mm') : ''}">time</span>
            </li>
          </ul>
        </div>
      </div>
    </section>
  </div>
</div>
