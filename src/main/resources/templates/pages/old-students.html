<div xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="title" th:text="#{page.oldStudents.title}">Old Students</div>
        <div class="subtle" th:text="#{oldStudents.subtitle}">Archived students grouped by academic year.</div>
      </div>
      <a class="btn primary"
         th:href="@{/old-students/new(year=${#strings.replace(selectedOldStudentYear,' ','-')})}"
         th:text="#{oldStudents.createPlain}">+ Add old student</a>
    </div>

    <div class="subtle uni-flash uni-flash--ok" th:if="${oldStudentSuccessKey}" th:text="#{__${oldStudentSuccessKey}__}">Saved.</div>
    <div class="subtle uni-flash uni-flash--err" th:if="${oldStudentErrorKey}" th:text="#{__${oldStudentErrorKey}__}">Error</div>

    <nav class="old-students-year-nav" aria-label="Academic year">
      <a th:each="year : ${oldStudentYears}"
         class="old-students-year-btn"
         data-no-page-transition
         th:classappend="${year == selectedOldStudentYear ? ' is-active' : ''}"
         th:href="@{/old-students/{y}(y=${#strings.replace(year,' ','-')})}"
         th:text="${year}">2022 2023</a>
    </nav>

    <div class="card applications-filters-card" style="background: rgba(255,255,255,.01); margin-bottom: 12px;">
      <div style="font-weight:800; margin-bottom: 10px;" th:text="#{applications.filters.title}">Advanced Filters</div>
      <div class="filters crm-app-form" id="oldStudentsFilters">
        <div class="field">
          <label th:text="#{common.search}">Search</label>
          <input type="search" id="oldStudentsQ" autocomplete="off" th:placeholder="#{common.search}">
        </div>
        <div class="field">
          <label th:text="#{nav.universities}">Universities</label>
          <select id="oldStudentsUni">
            <option value="" th:text="#{common.all}">All</option>
            <option th:each="u : ${oldStudentsUniversityOptions}" th:value="${u}" th:text="${u}">Uni</option>
          </select>
        </div>
        <div class="field">
          <label th:text="#{nav.programs}">Programs</label>
          <select id="oldStudentsDep">
            <option value="" th:text="#{common.all}">All</option>
            <option th:each="d : ${oldStudentsDepartmentOptions}" th:value="${d}" th:text="${d}">Dept</option>
          </select>
        </div>
        <div class="field">
          <label th:text="#{common.nationality}">Nationality</label>
          <select id="oldStudentsNat">
            <option value="" th:text="#{common.all}">All</option>
            <option th:each="n : ${oldStudentsNationalityOptions}" th:value="${n}" th:text="${n}">Nationality</option>
          </select>
        </div>
      </div>
    </div>

    <div class="table-wrap" id="oldStudentsTableWrap"
         th:attr="data-year-total=${oldStudentsYearTotalCount}">
      <table class="table">
        <thead>
        <tr>
          <th th:text="#{students.form.fullName}">Full name</th>
          <th th:text="#{nav.universities}">Universities</th>
          <th th:text="#{nav.programs}">Programs</th>
          <th th:text="#{students.col.passport}">Passport No.</th>
          <th th:text="#{common.email}">Email</th>
          <th th:text="#{common.phone}">Phone</th>
          <th th:text="#{common.nationality}">Nationality</th>
          <th th:text="#{common.actions}">Actions</th>
        </tr>
        </thead>
        <tbody id="oldStudentsTbody">
        <tr th:if="${#lists.isEmpty(oldStudentsRows)}" class="os-year-empty">
          <td colspan="8" class="empty" th:text="#{oldStudents.empty}">No rows for this year yet.</td>
        </tr>
        <tr th:if="${!#lists.isEmpty(oldStudentsRows)}" id="oldStudentsNoMatches" class="empty" style="display: none;">
          <td colspan="8" th:text="#{oldStudents.noMatches}">No matches.</td>
        </tr>
        <tr th:each="row, iter : ${oldStudentsRows}"
            class="os-data-row"
            th:attr="data-search=${#strings.toLowerCase(
                row['name'] + ' ' + row['university'] + ' ' + row['department'] + ' ' + row['passport'] + ' ' + row['email'] + ' ' + row['phone'] + ' ' + row['nationality'])}"
            th:data-u="${#strings.toLowerCase(row['university'])}"
            th:data-d="${#strings.toLowerCase(row['department'])}"
            th:data-n="${#strings.toLowerCase(row['nationality'])}">
          <td th:text="${row['name']}">Student</td>
          <td th:text="${row['university']}">University</td>
          <td th:text="${row['department']}">Department</td>
          <td th:text="${row['passport']}">Passport</td>
          <td th:text="${row['email']}">Email</td>
          <td th:text="${row['phone']}">Phone</td>
          <td th:text="${row['nationality']}">Nationality</td>
          <td>
            <a class="tag info"
               th:href="@{/old-students/{y}/edit/{idx}(y=${#strings.replace(selectedOldStudentYear,' ','-')}, idx=${iter.index})}"
               th:text="#{common.edit}">Edit</a>
          </td>
        </tr>
        </tbody>
      </table>
      <div class="old-students-pager" id="oldStudentsPager" style="display:none; margin-top: 12px; flex-wrap: wrap; align-items: center; gap: 8px;"></div>
      <div class="subtle" style="margin-top: 10px; text-align: right; font-weight: 600;" id="oldStudentsCountLabel">
      </div>
    </div>
  </div>

  <script th:inline="javascript">
    /*<![CDATA[*/
    (function () {
      var wrap = document.getElementById('oldStudentsTableWrap');
      var qEl = document.getElementById('oldStudentsQ');
      var uniEl = document.getElementById('oldStudentsUni');
      var depEl = document.getElementById('oldStudentsDep');
      var natEl = document.getElementById('oldStudentsNat');
      if (!wrap || !qEl || !uniEl || !depEl || !natEl) return;

      var PAGE_SIZE = 50;
      var total = parseInt(wrap.getAttribute('data-year-total') || '0', 10);
      var countPagedTpl = /*[[#{oldStudents.countPaged}]]*/ 'Rows {0}–{1} of {2} (filtered) • {3} in this year • Page {4} / {5}';
      var countSimpleTpl = /*[[#{oldStudents.countSummary}]]*/ 'Showing {0} of {1} students for this year.';
      var labelPrev = /*[[#{oldStudents.pagePrev}]]*/ 'Previous';
      var labelNext = /*[[#{oldStudents.pageNext}]]*/ 'Next';
      var rows = wrap.querySelectorAll('tr.os-data-row');
      var noMatchRow = document.getElementById('oldStudentsNoMatches');
      var countLabel = document.getElementById('oldStudentsCountLabel');
      var pagerEl = document.getElementById('oldStudentsPager');
      var currentPage = 1;

      function norm(s) {
        return (s || '').trim().toLowerCase();
      }

      function rowMatches(tr, q, u, d, n) {
        var hay = tr.getAttribute('data-search') || '';
        var rowU = tr.getAttribute('data-u') || '';
        var rowD = tr.getAttribute('data-d') || '';
        var rowN = tr.getAttribute('data-n') || '';
        if (u && rowU !== u) return false;
        if (d && rowD !== d) return false;
        if (n && rowN !== n) return false;
        if (q && hay.indexOf(q) === -1) return false;
        return true;
      }

      function renderPager(matchedCount) {
        if (!pagerEl) return;
        if (rows.length === 0 || matchedCount === 0) {
          pagerEl.style.display = 'none';
          pagerEl.innerHTML = '';
          return;
        }
        var totalPages = Math.max(1, Math.ceil(matchedCount / PAGE_SIZE));
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        pagerEl.style.display = 'flex';
        var parts = [];
        parts.push('<button type="button" class="btn" data-os-page="prev"' + (currentPage <= 1 ? ' disabled' : '') + '>' + escapeHtml(labelPrev) + '</button>');
        var maxButtons = 12;
        var start = Math.max(1, currentPage - 4);
        var end = Math.min(totalPages, start + maxButtons - 1);
        if (end - start < maxButtons - 1) start = Math.max(1, end - maxButtons + 1);
        if (start > 1) {
          parts.push(pageBtn(1));
          if (start > 2) parts.push('<span class="subtle">…</span>');
        }
        for (var p = start; p <= end; p++) {
          parts.push(pageBtn(p));
        }
        if (end < totalPages) {
          if (end < totalPages - 1) parts.push('<span class="subtle">…</span>');
          parts.push(pageBtn(totalPages));
        }
        parts.push('<button type="button" class="btn" data-os-page="next"' + (currentPage >= totalPages ? ' disabled' : '') + '>' + escapeHtml(labelNext) + '</button>');
        pagerEl.innerHTML = parts.join(' ');
        pagerEl.querySelectorAll('[data-os-page]').forEach(function (btn) {
          btn.addEventListener('click', onPagerClick);
        });
      }

      function escapeHtml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function pageBtn(p) {
        var cls = p === currentPage ? 'btn primary' : 'btn';
        return '<button type="button" class="' + cls + '" data-os-page="' + p + '">' + p + '</button>';
      }

      function onPagerClick(ev) {
        var raw = ev.currentTarget.getAttribute('data-os-page');
        var matched = collectMatches();
        var totalPages = Math.max(1, Math.ceil(matched.length / PAGE_SIZE));
        if (raw === 'prev') currentPage = Math.max(1, currentPage - 1);
        else if (raw === 'next') currentPage = Math.min(totalPages, currentPage + 1);
        else {
          var num = parseInt(raw, 10);
          currentPage = isNaN(num) ? 1 : Math.min(totalPages, Math.max(1, num));
        }
        applyVisibility(matched);
      }

      function collectMatches() {
        var q = norm(qEl.value);
        var u = norm(uniEl.value);
        var d = norm(depEl.value);
        var n = norm(natEl.value);
        var matched = [];
        for (var i = 0; i < rows.length; i++) {
          if (rowMatches(rows[i], q, u, d, n)) matched.push(rows[i]);
        }
        return matched;
      }

      function applyVisibility(matched) {
        var matchedCount = matched.length;
        var startIdx = (currentPage - 1) * PAGE_SIZE;
        var endIdx = startIdx + PAGE_SIZE;
        for (var i = 0; i < rows.length; i++) {
          rows[i].style.display = 'none';
        }
        for (var j = 0; j < matchedCount; j++) {
          if (j >= startIdx && j < endIdx) matched[j].style.display = '';
        }
        if (noMatchRow) {
          noMatchRow.style.display = (rows.length > 0 && matchedCount === 0) ? '' : 'none';
        }
        if (countLabel) {
          if (rows.length === 0) {
            countLabel.textContent = '';
          } else if (matchedCount === 0) {
            countLabel.textContent = countSimpleTpl.replace('{0}', '0').replace('{1}', String(total));
          } else {
            var totalPages = Math.max(1, Math.ceil(matchedCount / PAGE_SIZE));
            var from = startIdx + 1;
            var to = Math.min(matchedCount, startIdx + PAGE_SIZE);
            countLabel.textContent = countPagedTpl
              .replace('{0}', String(from))
              .replace('{1}', String(to))
              .replace('{2}', String(matchedCount))
              .replace('{3}', String(total))
              .replace('{4}', String(currentPage))
              .replace('{5}', String(totalPages));
          }
        }
        renderPager(matchedCount);
      }

      function applyFilters() {
        currentPage = 1;
        applyVisibility(collectMatches());
      }

      qEl.addEventListener('input', applyFilters);
      uniEl.addEventListener('change', applyFilters);
      depEl.addEventListener('change', applyFilters);
      natEl.addEventListener('change', applyFilters);
      applyFilters();
    })();
    /*]]>*/
  </script>
</div>
