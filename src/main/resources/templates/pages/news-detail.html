<div xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="title" th:text="${newsPost.title}">News</div>
        <div class="subtle">
          <span th:text="${newsPost.author != null ? (newsPost.author.displayName != null ? newsPost.author.displayName : newsPost.author.email) : '—'}">Author</span>
          ·
          <span th:text="${newsPost.createdAt != null ? @displayTime.format(newsPost.createdAt, 'yyyy-MM-dd HH:mm') : ''}">Date</span>
        </div>
      </div>
      <a class="btn" th:href="@{/news}" th:text="#{common.back}">Back</a>
    </div>
    <div class="subtle uni-flash uni-flash--ok" th:if="${newsSuccessKey}" th:text="#{__${newsSuccessKey}__}"></div>
    <div class="subtle uni-flash uni-flash--err" th:if="${newsErrorKey}" th:text="#{__${newsErrorKey}__}"></div>
    <div class="news-body subtle" th:if="${newsPost.body != null}" th:text="${newsPost.body}" style="white-space:pre-wrap;margin-bottom:20px;"></div>
  </div>

  <div class="card" style="margin-top:14px;">
    <div style="font-weight:800;margin-bottom:12px;" th:text="#{news.comments.title}">Comments</div>
    <div th:if="${#lists.isEmpty(newsComments)}" class="empty" th:text="#{news.comments.empty}">No comments yet.</div>
    <div class="feedback-comment-list" th:if="${!#lists.isEmpty(newsComments)}">
      <article th:each="c : ${newsComments}" class="feedback-comment-card">
        <div class="feedback-comment-card-head">
          <span class="feedback-comment-author" th:text="${c.author != null ? (c.author.displayName != null ? c.author.displayName : c.author.email) : '—'}">User</span>
          <time class="feedback-comment-time subtle" th:text="${c.createdAt != null ? @displayTime.format(c.createdAt, 'yyyy-MM-dd HH:mm') : ''}">—</time>
        </div>
        <div class="feedback-comment-body" th:text="${c.body}">Comment</div>
      </article>
    </div>
    <form th:action="@{|/news/${newsPost.id}/comments|}" method="post" class="profile-form" style="margin-top:16px;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="field">
        <label th:text="#{news.comments.add}">Add comment</label>
        <textarea name="body" rows="3" maxlength="2000" required></textarea>
      </div>
      <button type="submit" class="btn primary" th:text="#{news.comments.submit}">Post comment</button>
    </form>
  </div>
</div>
