<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" data-rama-theme-eligible="false"
      th:lang="${#locale.language}"
      dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <th:block th:replace="~{partials/theme-head :: themeHead}"></th:block>
  <title th:text="|${pageTitle} • ${metaSiteName}|">Sign up • Student CRM</title>
  <th:block th:replace="~{partials/social-meta :: socialMeta}"></th:block>
  <link rel="icon" type="image/jpeg" href="/images/logo.jpg">
  <link rel="stylesheet" th:href="@{/css/app.css(v=132)}">
</head>
<body class="auth-body">
<div class="auth-chrome-fabs">
  <th:block th:replace="~{partials/language-menu :: languageMenu ('languageMenuBtnSignup', 'languagePickerPanelSignup')}"></th:block>
  <div class="auth-theme-fab theme-menu-wrap">
    <button type="button" class="notification-btn theme-menu-btn" id="themeMenuBtnSignup"
            aria-expanded="false" aria-haspopup="dialog" aria-controls="themePickerPanelSignup"
            th:title="#{topbar.theme}">
      <svg class="theme-menu-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"></circle>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
      </svg>
    </button>
    <div class="notification-panel theme-picker-panel" id="themePickerPanelSignup" role="dialog" th:attr="aria-label=#{topbar.theme}" hidden>
      <div class="notification-panel-header" th:text="#{topbar.theme}">Theme</div>
      <div class="theme-picker-panel-body">
        <div id="themePickerSignup"></div>
      </div>
    </div>
  </div>
</div>
<div class="auth-shell">
  <div class="card auth-card auth-card--signup">
    <div class="card-header auth-header">
      <div>
        <div class="auth-brand">
          <img src="/images/logo.jpg" alt="Logo" class="auth-logo" width="56" height="56" loading="eager" decoding="async" fetchpriority="high">
          <div>
            <div class="auth-name" th:text="${metaSiteName}">Student CRM</div>
            <div class="subtle" th:text="#{brand.subtitle}">Student CRM Platform</div>
          </div>
        </div>
        <div class="title auth-title" th:text="#{auth.title.signup}">Create account</div>
        <div class="subtle" th:text="#{auth.subtitle.signup}">Add your details to join the workspace.</div>
      </div>
    </div>

    <form th:action="@{/signup}" th:object="${signupForm}" method="post" class="auth-form" novalidate>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <div class="field">
        <label for="displayName" th:text="#{auth.label.fullName}">Full name</label>
        <input id="displayName" th:field="*{displayName}" type="text" autocomplete="name" required>
        <div class="auth-error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></div>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" th:field="*{email}" type="email" autocomplete="email" required>
        <div class="auth-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
      </div>
      <div class="field">
        <label for="password" th:text="#{auth.label.password}">Password</label>
        <input id="password" th:field="*{password}" type="password" autocomplete="new-password" required minlength="8">
        <div class="subtle" style="font-size:12px;margin-top:4px;" th:text="#{auth.password.hint}">At least 8 characters.</div>
        <div class="auth-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
      </div>
      <div class="field">
        <label for="confirmPassword">Re-enter password</label>
        <input id="confirmPassword" th:field="*{confirmPassword}" type="password" autocomplete="new-password" required minlength="8">
        <div class="auth-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        <div class="auth-error" th:if="${#fields.hasErrors('passwordMatching')}" th:errors="*{passwordMatching}"></div>
      </div>
      <div class="auth-actions auth-actions--signup">
        <div class="auth-signup-btn-wrap">
          <button class="btn primary auth-btn auth-btn-signup" type="submit" th:text="#{auth.submit.signup}">Create account</button>
        </div>
      </div>
    </form>
    <p class="subtle auth-switch auth-switch--bottom">
      Already have an account?
      <a class="auth-link" th:href="@{/login}">Sign in</a>
    </p>
  </div>
</div>
<script th:src="@{/js/theme.js(v=7)}"></script>
</body>
</html>
